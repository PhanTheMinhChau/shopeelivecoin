<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live các nhà quen thuộc</title>

<style>

body{
    margin:0;
    font-family:system-ui,Arial;
    background:#f5f5f5;
}

/* header */

.live-header{
    display:flex;
    align-items:center;
    gap:8px;
    padding:14px 16px;
    font-size:16px;
    font-weight:700;
    background:white;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
}

.live-dot{
    width:10px;
    height:10px;
    background:red;
    border-radius:50%;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,0,0,0.7);}
    70%{box-shadow:0 0 0 8px rgba(255,0,0,0);}
    100%{box-shadow:0 0 0 0 rgba(255,0,0,0);}
}

/* loading */

.loading{
    display:flex;
    justify-content:center;
    align-items:center;
    height:150px;
}

.spinner{
    width:32px;
    height:32px;
    border:4px solid #eee;
    border-top:4px solid red;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

/* grid */

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    padding:12px;
}

.item{
    text-align:center;
}

.avatar-box{
    position:relative;
    width:72px;
    height:72px;
    margin:auto;
}

.avatar{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #ff2d55;
}

.live{
    position:absolute;
    bottom:-6px;
    left:50%;
    transform:translateX(-50%);
    background:red;
    color:white;
    font-size:10px;
    padding:2px 7px;
    border-radius:10px;
    font-weight:bold;
}

.username{
    margin-top:8px;
    font-size:12px;
    line-height:1.2;
    word-break:break-word;
}

</style>
</head>

<body>

<header class="live-header">
    <div class="live-dot"></div>
    <span>Live các nhà quen thuộc</span>
</header>

<div class="loading" id="loading">
    <div class="spinner"></div>
</div>

<div class="grid" id="grid"></div>

<script>

const grid = document.getElementById("grid")
const loading = document.getElementById("loading")

fetch("https://sharelink-kappa.vercel.app/get_live_session")
.then(res => res.json())
.then(data => {

    loading.style.display="none"

    data.sort((a,b)=>a.username.localeCompare(b.username,'vi'))

    data.forEach(i => {

        const card=document.createElement("div")
        card.className="item"

        card.innerHTML=`
            <a href="https://shopee.vn/universal-link?redir=https://live.shopee.vn/middle-page?id=${i.session_id}&uls_trackid=53nvku3b00p8&utm_campaign=id_13DH2fLLToO&utm_content=flashsale1----&utm_medium=affiliates&utm_source=an_17396220028&utm_term=don9zxk76jwm&deep_and_deferred=1" target="_blank">
                <div class="avatar-box">
                    <img class="avatar" src="https://cf.shopee.vn/file/${i.avatar}">
                    <div class="live">LIVE</div>
                </div>
            </a>
            <div class="username">${i.username}</div>
        `

        grid.appendChild(card)

    })

})
.catch(()=>{
    loading.innerHTML="Không tải được dữ liệu"
})

</script>

</body>
</html>
