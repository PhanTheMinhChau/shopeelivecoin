<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
<title>Live các nhà quen thuộc</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,Arial;
background:#f5f5f5;
}

/* header */

.live-header{
display:flex;
align-items:center;
gap:8px;
padding:14px 16px;
font-size:16px;
font-weight:700;
background:white;
border-bottom:1px solid #eee;
position:sticky;
top:0;
z-index:10;
}

.live-dot{
width:10px;
height:10px;
background:red;
border-radius:50%;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(255,0,0,0.7)}
70%{box-shadow:0 0 0 8px rgba(255,0,0,0)}
100%{box-shadow:0 0 0 0 rgba(255,0,0,0)}
}

/* search */

.search-box{
padding:10px 12px;
background:white;
border-bottom:1px solid #eee;
}

.search-input{
position:relative;
}

.search-icon{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
font-size:14px;
opacity:.6;
}

.clear-btn{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
font-size:16px;
cursor:pointer;
display:none;
opacity:.6;
}

.search-input input{
width:100%;
padding:10px 34px;
font-size:14px;
border-radius:20px;
border:1px solid #ddd;
outline:none;
background:#fafafa;
}

.search-input input:focus{
border-color:#ff2d55;
background:white;
}

/* suggestions */

.quick-suggestions{
display:flex;
gap:8px;
padding:10px 12px;
background:white;
border-bottom:1px solid #eee;
overflow-x:auto;
}

.suggest-btn{
padding:6px 12px;
background:#f2f2f2;
border-radius:20px;
font-size:13px;
cursor:pointer;
white-space:nowrap;
}

/* loading */

.loading{
display:flex;
justify-content:center;
align-items:center;
height:150px;
}

.spinner{
width:32px;
height:32px;
border:4px solid #eee;
border-top:4px solid red;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

/* grid */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
padding:12px;
}

.item{text-align:center}

.avatar-box{
position:relative;
width:72px;
height:72px;
margin:auto;
}

.avatar{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
border:3px solid #ff2d55;
}

.live{
position:absolute;
bottom:-6px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
font-size:10px;
padding:2px 7px;
border-radius:10px;
font-weight:bold;
}

/* coin */

.coin-badge{
position:absolute;
top:-6px;
right:-6px;
background:linear-gradient(45deg,#ff9800,#ff2d55);
color:white;
font-size:10px;
padding:2px 6px;
border-radius:12px;
font-weight:bold;
box-shadow:0 2px 6px rgba(0,0,0,.2);
white-space:nowrap;
}

.username{
margin-top:8px;
font-size:12px;
line-height:1.2;
word-break:break-word;
}

.live-header{
justify-content:space-between;
}

.reload-btn {
  display: block;
  width: 100%;
  text-align: center;
  padding: 12px;
  margin-bottom: 12px;

  background: rgba(255, 45, 0, 0.08); /* nền rất nhẹ */
  color: #ff2d00;

  border-radius: 12px;
  font-weight: 600;

  cursor: pointer;
  transition: all 0.2s;
}

.reload-btn:active {
  transform: scale(0.97);
}

</style>
</head>

<body>

<header class="live-header">
<div class="live-dot"></div>
<span>Live các nhà quen thuộc</span>
<button id="reloadBtn">⟳</button>
</header>

<div class="search-box">
<div class="search-input">
<span class="search-icon">🔍</span>
<input type="text" id="search" placeholder="Tìm nhà live...">
<span class="clear-btn" id="clear">✖</span>
</div>
</div>

<div class="quick-suggestions">
<span class="suggest-btn" data-key="" style="font-weight: 800;">#All</span>
<span class="suggest-btn" data-key="adpia">Adpia</span>
<span class="suggest-btn" data-key="accesstradevn">Xe</span>
<span class="suggest-btn" data-key="siêu sao">bịp</span>
<span class="suggest-btn" data-key="beyond">Beyonk</span>
<span class="suggest-btn" data-key="Woo">Woo</span>
<span class="suggest-btn" data-key="ecogo">Ecogo</span>
</div>

<div class="loading" id="loading">
<div class="spinner"></div>
</div>

<div class="grid" id="grid"></div>

<script>

const grid=document.getElementById("grid")
const loading=document.getElementById("loading")
const search=document.getElementById("search")
const clearBtn=document.getElementById("clear")

let liveData=[]

const alias={
"bịp":"siêu sao",
"xe":"accesstradevn"
}

function formatCoin(n){
if(!n) return 0
if(n>=1000) return (n/1000).toFixed(1)+'k'
return n
}

/* fetch */

function loadData(){

fetch("https://sharelink-kappa.vercel.app/get_live_session")
.then(res=>res.json())
.then(data=>{

loading.style.display="none"

/* SORT: coin trước, null xuống dưới */

data.sort((a,b)=>{
const coinA = a.coin ?? -1
const coinB = b.coin ?? -1

if(coinA !== coinB) return coinB - coinA

return a.username.localeCompare(b.username,'vi')
})

liveData=data

let q=search.value.toLowerCase()
if(alias[q]) q=alias[q]

render(liveData.filter(i=>
i.username.toLowerCase().includes(q)
))

})
.catch(()=>{
console.log("fetch lỗi")
})

}

/* render */

function render(list){

grid.innerHTML=""

const frag=document.createDocumentFragment()

list.forEach(i=>{

const card=document.createElement("div")
card.className="item"

card.innerHTML=`
<a href="https://s.shopee.vn/an_redir?affiliate_id=17396220028&sub_id=---livex-&origin_link=https%3A%2F%2Flive.shopee.vn%2Fshare%3Ffrom%3Dlive%26session%3D${i.session_id}" target="_blank">
<div class="avatar-box">
<img class="avatar" loading="lazy" src="https://cf.shopee.vn/file/${i.avatar}">
<div class="live">LIVE</div>
${i.coin != null ? `<div class="coin-badge">${formatCoin(i.coin)} xu</div>` : ``}
</div>
</a>
<div class="username">${i.username}</div>
`

frag.appendChild(card)

})

grid.appendChild(frag)

}

/* search */

search.addEventListener("input",e=>{

let q=e.target.value.toLowerCase()

clearBtn.style.display=q?"block":"none"

if(alias[q]) q=alias[q]

render(liveData.filter(i=>
i.username.toLowerCase().includes(q)
))

})

/* clear */

clearBtn.onclick=()=>{
search.value=""
clearBtn.style.display="none"
render(liveData)
}

/* suggestions */

document.querySelectorAll(".suggest-btn").forEach(btn=>{
btn.onclick=()=>{

const keyword=btn.dataset.key

search.value=keyword
clearBtn.style.display="block"

render(liveData.filter(i=>
i.username.toLowerCase().includes(keyword.toLowerCase())
))

}
})

/* init */

loadData()
setInterval(loadData,300000)

const reloadBtn = document.getElementById("reloadBtn")

let lastReload = 0
const RELOAD_COOLDOWN = 5000 // 5 giây

reloadBtn.onclick = () => {

    const now = Date.now()

    if(now - lastReload < RELOAD_COOLDOWN){
        return
    }

    lastReload = now

    // hiệu ứng quay
    reloadBtn.style.transform = "rotate(360deg)"

    // disable nút
    reloadBtn.classList.add("disabled")

    loadData()

    // mở lại sau cooldown
    setTimeout(()=>{
        reloadBtn.classList.remove("disabled")
        reloadBtn.style.transform = "rotate(0deg)"
    }, RELOAD_COOLDOWN)
}

</script>

</body>
</html>
