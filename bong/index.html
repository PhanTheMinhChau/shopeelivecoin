<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chéo bóng ShopeePay</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:linear-gradient(135deg,#1f2937,#111827);
    color:#fff;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    max-width:500px;
    padding:40px 30px;
}

.icon{
    font-size:72px;
    margin-bottom:20px;
}

h1{
    font-size:36px;
    margin-bottom:16px;
}

p{
    font-size:18px;
    color:#d1d5db;
    line-height:1.7;
}

.time{
    display:inline-block;
    margin-top:24px;
    padding:12px 24px;
    background:#2563eb;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
    <div class="icon">🛠️</div>
    <h1>Hệ thống đang bảo trì</h1>
    <p>
        Vui lòng quay lại sau.
    </p>

    <div class="time">
        Mở lại lúc <strong>20:00 tối nay</strong>
    </div>
</div>

</body>
</html>
