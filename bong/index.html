<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Đang bảo trì</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
    background:#f4e8e7;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.cover{
    display:block;
    width:min(100%,480px);
    aspect-ratio:16/7;
    object-fit:cover;
}

.card{
    width:calc(100% - 40px);
    max-width:480px;
    margin:0 20px;
    background:#fff;
    border-radius:20px;
    padding:38px 28px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.12);
}

.icon{
    font-size:68px;
    margin-bottom:18px;
}

h1{
    color:#ee4d2d;
    font-size:30px;
    margin-bottom:16px;
}

.desc{
    color:#666;
    line-height:1.8;
    font-size:16px;
}

.notice{
    margin:28px 0;
    padding:18px;
    border-radius:16px;
    background:#fff8e6;
    border:1px solid #ffd86b;
}

.notice-title{
    color:#8a5b00;
    font-size:14px;
    margin-bottom:8px;
}

.time{
    color:#ee4d2d;
    font-size:32px;
    font-weight:700;
}

.footer{
    margin-top:30px;
    color:#999;
    font-size:14px;
    line-height:1.8;
}

@media(max-width:480px){

    .card{
        padding:30px 22px;
    }

    h1{
        font-size:26px;
    }

    .time{
        font-size:20px;
    }

}
</style>
</head>

<body>

<img class="cover" src="https://shopeelivecoin.com/img/bong.png" alt="Banner">

<div class="card">

    <div class="icon">‼️</div>

    <h1>hết trận để vote</h1>

 
    <div class="notice">
        <div class="notice-title">
            vui lòng quay lại sau
        </div>
        <div class="time">
           dự kiến 02:00 sáng 13/7
        </div>
    </div>

    <div class="footer">
        <br><br>
        © ShopeeLiveCoin
    </div>

</div>

</body>
</html>
