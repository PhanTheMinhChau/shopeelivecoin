<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
<title>Gửi Link ShopeePay</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
    background:#ee4d2d;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:480px;
    background:#fff;
    border-radius:20px;
    padding:24px;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

.logo{
    text-align:center;
    color:#ee4d2d;
    font-size:30px;
    font-weight:700;
}

.desc{
    margin-top:10px;
    margin-bottom:24px;
    text-align:center;
    color:#666;
    line-height:1.6;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#333;
}

.input-group{
    position:relative;
}

input{
    width:100%;
    height:52px;
    border:1px solid #ddd;
    border-radius:12px;
    outline:none;
    font-size:15px;
    padding:0 80px 0 15px;
    transition:.2s;
}

input:focus{
    border-color:#ee4d2d;
}

.paste-btn{
    position:absolute;
    right:8px;
    top:50%;
    transform:translateY(-50%);
    border:none;
    background:#f5f5f5;
    color:#ee4d2d;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    font-size:14px;
}

.paste-btn:hover{
    background:#ffe7e1;
}

.submit-btn{
    width:100%;
    height:50px;
    margin-top:18px;
    border:none;
    border-radius:12px;
    background:#ee4d2d;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.submit-btn:disabled{
    opacity:.6;
    cursor:not-allowed;
}

.message{
    display:none;
    margin-top:16px;
    padding:14px;
    border-radius:10px;
    font-size:15px;
    line-height:1.5;
    word-break:break-word;
}

.success{
    background:#e8f8ed;
    color:#12833d;
}

.error{
    background:#fdecec;
    color:#d93025;
}

.notice{
    margin-top:16px;
    padding:14px;
    border-radius:10px;
    background:#fff8e6;
    border:1px solid #ffd76b;
    color:#8a5b00;
    font-size:14px;
    line-height:1.6;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#999;
    font-size:13px;
}
</style>

</head>

<body>

<div class="card">

    <div class="logo">
        HOÀ NHỊP BÓNG LĂN
    </div>

    <label>Link mời</label>

    <div class="input-group">
        <input
            id="link"
            type="url"
            placeholder="https://app.shopeepay.vn/u/xxxxxxxx">

        <button
            type="button"
            class="paste-btn"
            id="pasteBtn">
            Dán
        </button>
    </div>

    <button
        class="submit-btn"
        id="submit">
        Gửi
    </button>

    <div id="msg" class="message"></div>

    <div class="notice">
        ⚠️ Sau khi gửi link thành công, vui lòng đợi ít nhất <b>10 phút</b> để hệ thống xử lý hoàn tất.
    </div>

    <div class="footer">
        © ShopeeLiveCoin
    </div>

</div>

<script>

// const API="/link";
// Nếu frontend khác domain:
const API="https://shopeelivecoin-shopeepay.vercel.app/link";

const input=document.getElementById("link");
const btn=document.getElementById("submit");
const pasteBtn=document.getElementById("pasteBtn");
const msg=document.getElementById("msg");

function show(text,success){

    msg.className="message "+(success?"success":"error");
    msg.innerText=text;
    msg.style.display="block";

}

pasteBtn.onclick=async()=>{

    try{

        const text=await navigator.clipboard.readText();

        if(text){
            input.value=text.trim();
            input.focus();
        }

    }catch(e){

        show("Không thể đọc nội dung clipboard.",false);

    }

};

btn.onclick=async()=>{

    // Ẩn thông báo cũ
    msg.style.display="none";

    const link=input.value.trim();

    if(!link){

        show("Vui lòng nhập link.",false);
        return;

    }

    btn.disabled=true;
    btn.innerText="Đang gửi...";

    try{

        const response=await fetch(API,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                link
            })
        });

        const data=await response.json();

        if(response.ok){

            show(data.message || "Gửi thành công.",true);
            input.value="";

        }else{

            show(data.detail || "Có lỗi xảy ra.",false);

        }

    }catch(e){

        show("Không thể kết nối tới máy chủ.",false);

    }

    btn.disabled=false;
    btn.innerText="Gửi";

};

input.addEventListener("keydown",function(e){

    if(e.key==="Enter"){
        btn.click();
    }

});

</script>

</body>
</html>
