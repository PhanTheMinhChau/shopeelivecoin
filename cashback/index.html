<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopee Rewards</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: linear-gradient(180deg, #ff5a00, #ff2d00);
}

/* HEADER */
.header {
  padding: 20px 16px 100px;
  color: white;
  text-align: center;
  position: relative;
}

.title {
  font-size: 20px;
  font-weight: 700;
}

.subtitle {
  font-size: 13px;
  margin-top: 6px;
  opacity: 0.9;
}

/* CARD */
.card {
  background: #f5f5f5;
  margin: -80px 12px 0;
  border-radius: 24px;
  padding: 16px;
}

/* BANNER */
.banner {
  width: 100%;
  border-radius: 16px;
  margin-bottom: 14px;
}

/* DESC */
.desc {
  text-align: center;
  color: #666;
  font-size: 14px;
  margin: 0 0 16px;
}

/* BUTTON */
.btn {
  display: block;
  width: 100%;
  background: linear-gradient(90deg, #ff5a00, #ff2d00);
  color: white;
  text-align: center;
  padding: 14px;
  border-radius: 14px;
  font-weight: 600;
  text-decoration: none;
}

/* LIST */
.list {
  margin-top: 20px;
}

/* ITEM */
.item {
  display: flex;
  align-items: center;
  background: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 14px;
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin-right: 10px;
}

.info {
  flex: 1;
}

.package {
  font-size: 14px;
  font-weight: 600;
}

.badge {
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 12px;
  margin-left: 6px;
}

.green { background: #e6f7ef; color: #00a14b; }
.orange { background: #fff4e5; color: #ff9800; }
.red { background: #fdecea; color: #e53935; }

.time {
  font-size: 12px;
  color: #888;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="title">SHOPEE REWARDS HOÀN XU</div>
  <div class="subtitle">
    Hoàn đến 800.000 Xu cho 4 đơn hàng<br>
    Chỉ áp dụng ngày 20.3
  </div>
</div>

<!-- CARD -->
<div class="card">

  <img class="banner"
    src="https://cf.shopee.vn/file/vn-11134001-81ztc-mm08aor855ok53"
    onerror="this.src='https://via.placeholder.com/300x120'">

  <div class="desc">
    Cơ hội hoàn đến 200.000 Xu cho đơn hàng của bạn
  </div>

  <a href="https://s.shopee.vn/6pw7G4il77" class="btn">🛒 Mua sắm ngay</a>

  <!-- LIST -->
  <div class="list" id="list"></div>

</div>

<script>
const API = "https://sharelink-kappa.vercel.app/cashback";

// format giờ
function formatClock(epoch) {
  return new Date(epoch * 1000).toLocaleTimeString("vi-VN");
}

// time ago
function timeAgo(epoch) {
  const now = Math.floor(Date.now() / 1000);
  const diff = now - epoch;

  if (diff < 5) return "vừa xong";
  if (diff < 60) return `${diff} giây trước`;
  if (diff < 3600) return `${Math.floor(diff / 60)} phút trước`;
  if (diff < 86400) return `${Math.floor(diff / 3600)} giờ trước`;
  return `${Math.floor(diff / 86400)} ngày trước`;
}

function getColor(pkg) {
  if (pkg.includes("5%")) return "green";
  if (pkg.includes("4%")) return "orange";
  return "red";
}

const list = document.getElementById("list");

function render(data) {
  list.innerHTML = "";

  data.slice(0, 20).forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <img class="avatar" src="${item.avt}" 
           onerror="this.src='https://via.placeholder.com/40'">

      <div class="info">
        <div class="package">
          Nhận thưởng 
          <span class="badge ${getColor(item.package_name)}">
            ${item.package_name}
          </span>
        </div>

        <div class="time">
          ${formatClock(item.lucky_time)} • ${timeAgo(item.lucky_time)}
        </div>
      </div>
    `;

    list.appendChild(div);
  });
}

// fetch
async function load() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    data.sort((a, b) => b.lucky_time - a.lucky_time);
    render(data);
  } catch (e) {
    console.log(e);
  }
}

// auto load
setInterval(load, 20000);
load();
</script>

</body>
</html>
