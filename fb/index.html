<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convert Link Shopee</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: linear-gradient(135deg, #ff6a00, #ee4d2d);
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 18px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.15);
  margin-bottom: 15px;
}

h2 {
  margin: 0 0 10px;
  font-size: 20px;
}

/* INPUT */
.input-group {
  display: flex;
  gap: 10px;
}

.input {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 15px;
}

.convert-btn {
  width: 50px;
  border: none;
  border-radius: 12px;
  background: #ee4d2d;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.convert-btn.loading {
  opacity: 0.6;
  pointer-events: none;
}

/* RESULT */
.result-card {
  margin-top: 12px;
  background: #f9f9f9;
  border-radius: 14px;
  padding: 12px;
  display: none;
}

.result-text {
  font-size: 14px;
  word-break: break-all;
  margin-bottom: 10px;
}

.result-actions {
  display: flex;
  gap: 8px;
}

.copy-btn, .go-btn {
  flex: 1;
  border: none;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
  cursor: pointer;
}

.copy-btn {
  background: #2ecc71;
  color: white;
}

.go-btn {
  background: #1877f2;
  color: white;
}

/* STEPS */
.steps {
  font-size: 14px;
  line-height: 1.5;
}

.step {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.step-number {
  min-width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #ee4d2d;
  color: white;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* VOUCHER */
.voucher-box img {
  width: 100%;
  border-radius: 14px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
}

/* LOADING */
.loading-text {
  text-align: center;
  font-size: 14px;
  color: white;
  display: none;
}
</style>
</head>

<body>

<div class="container">

  <!-- HƯỚNG DẪN -->
  <div class="card">
    <h2>📌 Cách sử dụng</h2>
    <div class="steps">
      <div class="step"><div class="step-number">1</div><div>Vào app Shopee → sao chép link sản phẩm</div></div>
      <div class="step"><div class="step-number">2</div><div>Dán link → chuyển đổi → sao chép link mới</div></div>
      <div class="step"><div class="step-number">3</div><div>Vào bài viết fb.com/dhgdhd → bình luận link</div></div>
      <div class="step"><div class="step-number">4</div><div>Click link để mở Shopee</div></div>
    </div>
  </div>

  <!-- TOOL -->
  <div class="card">
    <h2>🔗 Convert Link</h2>

    <div class="input-group">
      <input id="urlInput" class="input" placeholder="Dán link Shopee..." />
      <button class="convert-btn" onclick="convertLink()">→</button>
    </div>

    <div id="resultCard" class="result-card">
      <div id="resultText" class="result-text"></div>
      <div class="result-actions">
        <button class="copy-btn" onclick="copyLink()">Copy</button>
        <button class="go-btn" onclick="goPost()">Vào bài viết</button>
      </div>
    </div>
  </div>

  <div id="loading" class="loading-text">Đang xử lý...</div>
  <!-- VOUCHER HIỂN THỊ LUÔN -->
  <div class="card voucher-box">
    <a target="_blank">
      <img src="../img/voucherfb.jpg" alt="Voucher">
    </a>
  </div>

</div>

<script>
let currentLink = "";
const POST_URL = "https://www.facebook.com/share/p/18XqTP6TEc/?mibextid=wwXIfr";

async function convertLink() {
  const url = document.getElementById("urlInput").value.trim();
  const loading = document.getElementById("loading");
  const resultCard = document.getElementById("resultCard");
  const btn = document.querySelector(".convert-btn");

  if (!url) {
    alert("Nhập link trước 😅");
    return;
  }

  btn.classList.add("loading");
  btn.disabled = true;
  btn.innerText = "...";

  resultCard.style.display = "none";
  loading.style.display = "block";

  try {
    const res = await fetch("https://shopeelivecoinbackend.vercel.app/get_link", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url })
    });

    const data = await res.json();

    if (data.link) {
      currentLink = data.link;
      document.getElementById("resultText").innerText = data.link;
      resultCard.style.display = "block";
    } else {
      alert("Không có dữ liệu 😢");
    }

  } catch (err) {
    alert("Lỗi: " + err.message);
  }

  loading.style.display = "none";
  btn.classList.remove("loading");
  btn.disabled = false;
  btn.innerText = "→";
}

function copyLink() {
  if (!currentLink) return;

  navigator.clipboard.writeText(currentLink)
    .then(() => alert("Đã copy 🎉"))
    .catch(() => alert("Copy lỗi"));
}

function goPost() {
  window.open(POST_URL, "_blank");
}
</script>

</body>
</html>
