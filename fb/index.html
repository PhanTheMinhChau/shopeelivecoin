<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convert Link Shopee</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f5f6fa;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
  margin: 0 0 15px;
  font-size: 20px;
}

.input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 15px;
  margin-bottom: 12px;
  outline: none;
}

.input:focus {
  border-color: #ee4d2d;
}

.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

.btn-primary {
  background: #ee4d2d;
  color: white;
}

.btn-primary:active {
  opacity: 0.9;
}

.result-box {
  margin-top: 15px;
  display: none;
}

.result {
  background: #f1f2f6;
  padding: 12px;
  border-radius: 10px;
  font-size: 14px;
  word-break: break-all;
  margin-bottom: 10px;
}

.copy-btn {
  background: #2ecc71;
  color: white;
}

.loading {
  text-align: center;
  margin-top: 10px;
  font-size: 14px;
  color: #888;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>🔗 Convert Link Shopee</h2>

    <input id="urlInput" class="input" placeholder="Dán link vào đây..." />

    <button class="btn btn-primary" onclick="convertLink()">
      Chuyển đổi
    </button>

    <div id="loading" class="loading" style="display:none;">
      Đang xử lý...
    </div>

    <div id="resultBox" class="result-box">
      <div id="result" class="result"></div>
      <button class="btn copy-btn" onclick="copyLink()">
        Sao chép link
      </button>
    </div>
  </div>
</div>

<script>
let currentLink = "";

async function convertLink() {
  const url = document.getElementById("urlInput").value.trim();
  const loading = document.getElementById("loading");
  const resultBox = document.getElementById("resultBox");

  if (!url) {
    alert("Nhập link trước đã 😅");
    return;
  }

  resultBox.style.display = "none";
  loading.style.display = "block";

  try {
    const res = await fetch("https://shopeelivecoinbackend.vercel.app/get_link", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ url })
    });

    const data = await res.json();

    loading.style.display = "none";

    if (data.link) {
      currentLink = data.link;
      document.getElementById("result").innerText = data.link;
      resultBox.style.display = "block";
    } else {
      alert("Không nhận được link 😢");
    }

  } catch (err) {
    loading.style.display = "none";
    alert("Lỗi: " + err.message);
  }
}

function copyLink() {
  navigator.clipboard.writeText(currentLink)
    .then(() => {
      alert("Đã copy 🎉");
    })
    .catch(() => {
      alert("Copy thất bại");
    });
}
</script>

</body>
</html>
